<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Resource - Resources</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="container">
        <header style="display: flex; justify-content: space-between; align-items: flex-start;">
            <div>
                <a href="index.html" class="back-link">← Back to Resources</a>
                <h1>Add New Resource</h1>
            </div>
            <button id="theme-toggle" class="icon-btn" aria-label="Toggle Theme"
                style="margin-top: 0.5rem; padding: 0.5rem;">
                <svg id="theme-icon" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2"
                    viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round"
                        d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z">
                    </path>
                </svg>
            </button>
        </header>

        <div class="admin-panel" style="display: block; margin-top: 2rem;">
            <div class="admin-form" id="add-form">
                <label for="admin-url" style="font-weight: 600; font-size: 0.9rem; margin-top: 0.5rem;">URL</label>
                <input type="url" id="admin-url" placeholder="Paste URL here..." autocomplete="off" required>

                <label for="admin-title" style="font-weight: 600; font-size: 0.9rem; margin-top: 0.5rem;">Title</label>
                <input type="text" id="admin-title" placeholder="Title (Auto-fetched if possible)" autocomplete="off"
                    required>

                <label style="font-weight: 600; font-size: 0.9rem; margin-top: 0.5rem;">Tags (press space, comma, or
                    enter to add)</label>
                <div class="tag-input-container" id="tag-container">
                    <input type="text" id="tag-input-field" placeholder="backend, design, tool..." autocomplete="off">
                </div>

                <div class="admin-actions" style="margin-top: 1.5rem;">
                    <button type="submit" id="submit-btn" class="primary-btn">Add to Library</button>
                    <span id="status-message"></span>
                </div>
            </div>
        </div>
    </div>

    <script src="theme.js"></script>
    <script>
        const urlInput = document.getElementById('admin-url');
        const titleInput = document.getElementById('admin-title');
        const tagContainer = document.getElementById('tag-container');
        const tagInputField = document.getElementById('tag-input-field');
        const submitBtn = document.getElementById('submit-btn');
        const statusMessage = document.getElementById('status-message');

        let tags = [];

        // --- Auto Fetch Title ---
        urlInput.addEventListener('blur', async () => {
            const url = urlInput.value.trim();
            if (!url || titleInput.value.trim() !== '') return;

            statusMessage.textContent = 'Fetching title...';
            statusMessage.style.color = 'var(--text-secondary)';

            try {
                const response = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(url)}`);
                if (!response.ok) throw new Error('Network response was not ok');
                const data = await response.json();

                const match = data.contents.match(/<title[^>]*>([^<]+)<\/title>/i);
                if (match && match[1]) {
                    const doc = new DOMParser().parseFromString(match[1], "text/html");
                    titleInput.value = doc.documentElement.textContent.trim();
                    statusMessage.textContent = '';
                } else {
                    statusMessage.textContent = 'Could not find a title.';
                }
            } catch (error) {
                console.error('Error fetching title:', error);
                statusMessage.textContent = 'Failed to fetch title automatically.';
            }
        });

        // --- Fluid Tag Logic ---
        function updateTags() {
            const existingChips = tagContainer.querySelectorAll('.tag-chip');
            existingChips.forEach(chip => chip.remove());

            tags.forEach((tag, index) => {
                const chip = document.createElement('div');
                chip.className = 'tag-chip';
                chip.innerHTML = `
                    <span>${tag}</span>
                    <span class="tag-chip-remove" onclick="removeTag(${index})">&times;</span>
                `;
                tagContainer.insertBefore(chip, tagInputField);
            });
        }

        window.removeTag = function (index) {
            tags.splice(index, 1);
            updateTags();
        };

        tagInputField.addEventListener('keydown', (e) => {
            if (e.key === ' ' || e.key === 'Enter' || e.key === ',') {
                e.preventDefault();
                const val = tagInputField.value.trim().replace(/,/g, '').toLowerCase();
                if (val && !tags.includes(val)) {
                    tags.push(val);
                    tagInputField.value = '';
                    updateTags();
                }
            } else if (e.key === 'Backspace' && tagInputField.value === '' && tags.length > 0) {
                tags.pop();
                updateTags();
            }
        });

        tagContainer.addEventListener('click', () => tagInputField.focus());

        // --- Submit Logic ---
        submitBtn.addEventListener('click', async () => {
            const url = urlInput.value.trim();
            const title = titleInput.value.trim();

            if (!url || !title) {
                statusMessage.textContent = 'URL and Title are required!';
                statusMessage.style.color = 'red';
                return;
            }

            submitBtn.disabled = true;
            submitBtn.textContent = 'Adding...';

            try {
                const response = await fetch('/api/add', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ title, url, tags })
                });

                if (!response.ok) {
                    const errText = await response.text();
                    throw new Error(errText || 'Failed to save');
                }

                statusMessage.textContent = 'Added successfully! Redirecting...';
                statusMessage.style.color = 'green';

                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 1000);

            } catch (err) {
                console.error('Error saving:', err);
                statusMessage.textContent = err.message;
                statusMessage.style.color = 'red';
                submitBtn.disabled = false;
                submitBtn.textContent = 'Add to Library';
            }
        });
    </script>
</body>

</html>
